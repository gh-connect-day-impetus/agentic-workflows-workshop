name: Data Quality Regression Review
description: Trigger agent council analysis for a dashboard data quality regression.
title: "[Agent Council][Data Quality] Pending participant"
labels:
  - "scenario:data-quality-regression"
body:
  - type: textarea
    id: scenario
    attributes:
      label: Prepared scenario
      description: Leave this text unchanged for the workshop.
      value: |
        ## Scenario

        The Revenue Health dashboard shows a sudden regional revenue drop after a source-system reconciliation change.

        ## Business impact

        Sales operations is delaying a weekly forecast review because the dashboard numbers no longer match source extracts.

        ## Symptoms

        - APAC revenue appears 17% lower than the source export.
        - Validation found duplicate invoice IDs in one source batch.
        - A lineage note shows a new deduplication rule was added.
        - Dashboard refresh completed successfully, so this is a silent quality issue.

        ## Evidence pack

        - `evidence/data-quality-regression/source-sample.csv`
        - `evidence/data-quality-regression/validation-report.txt`
        - `evidence/data-quality-regression/dashboard-alert.md`
        - `evidence/data-quality-regression/lineage-notes.md`

        ## Council ask

        Use agent council to identify the likely data quality failure, compare remediation options, recommend the safest next action, list missing evidence, and call out dissent between council roles.
    validations:
      required: true
